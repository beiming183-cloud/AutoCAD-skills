interface:
  display_name: "AutoCAD GB/T Mechanical Drafting"
  short_description: "GB/T CAD, product concept gates, DRC, and 2D/3D verification"
  default_prompt: "Create or revise the mechanical CAD using verified GB/T editions and the cheapest valid verification tier. For a new or substantially redesigned consumer product, require a complete people/scenario/interface/action/cable brief, three low-cost concepts and authorized selection, verified purchased-part envelopes, applicable mains/moving-part safety architecture, an early skeleton preview, and a separate product-design review before detailed CAD. Read back every mutable result and hard-stop on any requested-versus-actual semantic mismatch; after one failed recovery, switch to a verified backend or report blocked. Require explicit topology ownership, common view sources, plot-scale truth, disclosed limitations, and external human approval for manufacturing release."
