    <text x="72" y="174" font-size="48" font-weight="750">Mechanical CAD</text>
    <text x="72" y="224" font-size="48" font-weight="750">that proves its work.</text>
    <text x="72" y="262" font-size="21" fill="#4b5563">GB/T · AutoCAD/MCP · 2D/3D · semantic DRC</text>
    <text x="72" y="290" font-size="21" fill="#4b5563">Product safety gates for AI agents</text>

    <g transform="translate(72 316)">
