<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">AutoCAD Skills project preview</title>
  <desc id="desc">A GB/T mechanical CAD skill for AI agents with strict DRC, cross-view verification, and product safety gates.</desc>
  <rect width="1280" height="640" fill="#f7f7f2"/>
  <rect x="0" y="0" width="20" height="640" fill="#e63946"/>
  <rect x="20" y="0" width="8" height="640" fill="#0b7a75"/>

